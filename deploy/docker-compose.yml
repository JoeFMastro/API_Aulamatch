version: '3.9'

# ──────────────────────────────────────────────────────────────
# AulaMatch — Docker Compose (entorno de desarrollo local)
# Servicios: db + backend
#
# Uso:
#   cp .env.example .env   # completar valores reales
#   docker compose -f deploy/docker-compose.yml up --build
#
# Variables de entorno: todas provistas por env_file desde ../.env.
# REGLA: no usar ${VAR} en environment: para variables definidas en
# .env — environment: tiene prioridad sobre env_file y la interpolación
# ${VAR} se resuelve antes de que env_file se aplique, buscando en el
# directorio del compose (deploy/) donde no existe .env → queda vacía.
#
# Para cambiar puertos si 5432 o 3001 están en uso:
#   Editar HOST_DB_PORT y HOST_BACKEND_PORT en .env
# ──────────────────────────────────────────────────────────────

services:

  # ─── Base de datos ───────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: aulamatch_db
    restart: unless-stopped
    # env_file provee: POSTGRES_DB, POSTGRES_USER, POSTGRES_PASSWORD
    env_file:
      - ../.env
    ports:
      - "${HOST_DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../backend/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aulamatch_user} -d ${POSTGRES_DB:-aulamatch}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── Backend API ──────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: dev            # usa la etapa dev (nodemon) para desarrollo
    container_name: aulamatch_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy   # espera a que Postgres esté listo
    ports:
      - "${HOST_BACKEND_PORT:-3001}:3001"
    # env_file provee: POSTGRES_PASSWORD, JWT_SECRET, JWT_EXPIRES_IN,
    # DB_NAME, DB_USER, DB_PASSWORD, DATABASE_URL, PORT, etc.
    env_file:
      - ../.env
    environment:
      # Solo se declaran aquí valores que difieren del .env local
      # o que son exclusivos del contexto de red Docker:
      NODE_ENV: development
      # DB_HOST apunta al nombre del servicio Docker "db", no a "localhost".
      # Sobreescribe intencionalmente el DB_HOST=db del .env (que ya es correcto,
      # pero se deja explícito para dejar claro el override estructural Docker).
      DB_HOST: db
    volumes:
      # Monta el código fuente para hot-reload con nodemon
      - ../backend:/app
      # Excluye node_modules del contenedor para no pisarlos con los del host
      - /app/node_modules

volumes:
  postgres_data:
    driver: local
